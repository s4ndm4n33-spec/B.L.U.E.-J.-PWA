<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1a2d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0079f2"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#00f0ff" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Outer ring -->
  <circle cx="256" cy="230" r="120" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.6" filter="url(#neon)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="230" r="90" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.3"/>
  <!-- J. text -->
  <text x="256" y="255" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="100" fill="#00f0ff" filter="url(#neon)">J.</text>
  <!-- B.L.U.E.-J. text -->
  <text x="256" y="400" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="36" fill="#00f0ff" letter-spacing="8" opacity="0.9">B.L.U.E.-J.</text>
  <!-- Subtitle -->
  <text x="256" y="435" text-anchor="middle" font-family="monospace" font-size="16" fill="#00f0ff" opacity="0.4" letter-spacing="4">CODE GENESIS</text>
  <!-- Corner brackets -->
  <path d="M40,100 L40,40 L100,40" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <path d="M412,40 L472,40 L472,100" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <path d="M40,412 L40,472 L100,472" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <path d="M412,472 L472,472 L472,412" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
</svg>
