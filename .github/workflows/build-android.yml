###############################################################################
# B.L.U.E.-J. — Android Build (.apk)
###############################################################################
name: "\U0001F4F1 Build Android"

on:
  push:
    branches: [build/android]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    uses: ./.github/workflows/build-frontend.yml

  build-android:
    name: Android (.apk)
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: npm install --no-package-lock

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Install Capacitor
        run: npm install @capacitor/cli @capacitor/android --no-package-lock

      - name: Init Capacitor (if needed)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync & Build
        run: |
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Collect APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/BLUE-J.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/BLUE-J.apk
          retention-days: 30
