###############################################################################
# B.L.U.E.-J. — Build Desktop + Mobile Installers (Fixed)
###############################################################################

name: Build Standalone Apps

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────────────────
  # Step 1: Build the Vite frontend
  # ─────────────────────────────────────────────────────────
  build-frontend:
    name: 📦 Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Cache removed to prevent lockfile error

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # Step 2a: Windows Desktop (.exe)
  # ─────────────────────────────────────────────────────────
  build-windows:
    name: 🖥️ Windows (.exe)
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Build Electron app
        run: npx electron-builder --windows --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Step 2b: Linux Desktop (.AppImage + .deb)
  # ─────────────────────────────────────────────────────────
  build-linux:
    name: 🐧 Linux (.AppImage)
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Build Electron app
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux builds
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            release/*.AppImage
            release/*.deb
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Step 2c: Android APK
  # ─────────────────────────────────────────────────────────
  build-android:
    name: 📱 Android (.apk)
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/android --no-package-lock

      - name: Initialize Capacitor (if needed)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/BLUE-J.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/BLUE-J.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Step 3: Auto-create GitHub Release
  # ─────────────────────────────────────────────────────────
  create-release:
    name: 🚀 Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: B.L.U.E.-J. ${{ github.ref_name }}
          draft: Final
          prerelease: 1
          generate_release_notes: M.O.T.
          files: |
            artifacts/windows-installer/*
            artifacts/linux-builds/*
            artifacts/android-apk/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
